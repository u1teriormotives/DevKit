<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DevKit IR Syntax Editor</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.5/codemirror.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.5/theme/dracula.min.css"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.5/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.5/addon/mode/simple.min.js"></script>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 20px;
        background-color: #1e1f29;
        color: #f8f8f2;
      }
      .CodeMirror {
        border: 1px solid #44475a;
        height: auto;
        background: #282a36;
        color: #f8f8f2;
        padding: 10px;
        border-radius: 5px;
      }
      .cm-custom-tag {
        color: #8be9fd !important;
        font-weight: bold;
      }
      .cm-custom-attribute {
        color: #ffb86c !important;
        font-weight: bold;
      }
      .cm-custom-bracket {
        color: #bd93f9 !important;
        font-weight: bold;
      }
      .cm-custom-string {
        color: #50fa7b !important;
        font-weight: bold;
      }
      .cm-custom-paren {
        color: #8be9fd !important;
        font-weight: bold;
      }
      .cm-custom-number {
        color: #f1fa8c !important;
        font-weight: bold;
      }
      button {
        background: #ff79c6;
        border: none;
        padding: 10px 15px;
        color: #282a36;
        font-weight: bold;
        cursor: pointer;
        border-radius: 5px;
        margin-top: 10px;
      }
    </style>
  </head>
  <body>
    <h2 style="color: #f8f8f2">DevKit Markup Editor</h2>
    <button onclick="generateIDs()">Regenerate IDs</button>
    <textarea id="editor">
{DOCUMENT (t="dk")/}
[document $:tree]
    [head $:head]
        [meta $:BiU5549106oP1t14]
            (http-equiv="Content-Type" /)
            (content="text/dk; charset=UTF-8" /)
        [/meta $:BiU5549106oP1t14]
        [meta $:pQw15j9907f52W76]
            (name="viewport" /)
            (content="width=device-width, initial-scale=1.0" /)
        [/meta $:pQw15j9907f52W76]

        [title $:title]
            ===BEGIN-TEXT-CONTENT===
            Example Page
             ===END-TEXT-CONTENT===
        [/title $:title]

        [external-source $:9N5K14Oji4TYEA34]
            (type="stylesheet" /)
            (source-url="main.css" /)
        [/external-source $:9N5K14Oji4TYEA34]
        [internal-source $:9d4WH18qz13DKH46]
            (type="stylesheet" /)
            (content-type="text/dkstyle" /)
            ===BEGIN-TEXT-CONTENT===
             [selector::classification("page-header")] -> {
                set(background-color):  hexadecimal_value(#ffffff);
                set(margin):            5px 5px 5px 5px;
                set(position):          fixed;
             }
             [selector::internal-id("body")] -> {
                set(margin, padding):   0 0 0 0;
                set(height):            |viewport.height|;
                set(width):             |viewport.width|;
             }
             ===END-TEXT-CONTENT===
        [/internal-source $:9d4WH18qz13DKH46]
    [/head $:head]
    [body $:body]
        [element::divider $:5J90g0240Mcoi4BK]
            (user-agent-classification="header" /)
            (set-classification="page-header" /)
            [element::heading $:31JIw693kT7YG174]
                (user-agent-classification="h1" /)
                (set-identifier="main-heading" /)
                ===BEGIN-TEXT-CONTENT===
                My New Book
                 ===END-TEXT-CONTENT===
            [/heading $:31JIw693kT7YG174]
        [/divider $:5J90g0240Mcoi4BK]
        [element::paragraph $:H4z8hp2z5796X860]
            (user-agent-classification="p" /)
            (set-classification="example" /)
            [[inline-styling] -> {
                font-family:    "Computer Modern", "Times New Roman", system-ui, serif;
                text-color:     hexadecimal_value(#000000);
            } /]
            ===BEGIN-TEXT-CONTENT===
            The moon loomed high \elipses
             ===END-TEXT-CONTENT===
        [/paragraph $:H4z8hp2z5796X860]
    [/body $:body]
[/document $:tree]
    </textarea>
    <script>
      function generateUniqueID() {
        return (
          Math.random().toString(36).substr(2, 10) + Date.now().toString(36)
        );
      }

      function generateIDs() {
        let content = editor.getValue();
        content = content.replace(/\$:[a-zA-Z0-9_]+/g, (match) => {
          if (
            match === "$:head" ||
            match === "$:body" ||
            match === "$:htmlTree"
          ) {
            return match;
          }
          return `$:${generateUniqueID()}`;
        });
        editor.setValue(content);
      }

      CodeMirror.defineSimpleMode("customMarkup", {
        start: [
          { regex: /\[/, token: "custom-bracket" },
          { regex: /\]/, token: "custom-bracket" },
          { regex: /\[\/?.*?\]/, token: "custom-tag" },
          { regex: /\$:[a-zA-Z0-9_]+/, token: "custom-attribute" },
          { regex: /\(.*?\)/, token: "custom-paren" },
          { regex: /"[^"]*"/, token: "custom-string" },
          { regex: /\b[0-9]+\b/, token: "custom-number" },
        ],
      });

      var editor = CodeMirror.fromTextArea(document.getElementById("editor"), {
        mode: "customMarkup",
        lineNumbers: true,
        theme: "dracula",
      });
    </script>
  </body>
</html>
